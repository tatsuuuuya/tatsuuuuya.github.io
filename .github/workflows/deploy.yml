name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: castle-practice/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: castle-practice
      - name: Build castle-practice
        run: npm run build
        working-directory: castle-practice
      - name: Prepare deployment
        run: |
          mkdir -p _site/castle-practice _site/coordinate-practice
          cp index.html _site/
          cp -r castle-practice/dist/. _site/castle-practice/
          cp coordinate-practice/index.html _site/coordinate-practice/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
