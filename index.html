<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#121212">
    <title>将棋練習ツール</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
            user-select: none;
        }

        h1 {
            font-size: clamp(22px, 5dvw, 36px);
            font-weight: bold;
            letter-spacing: 0.1em;
            margin: 0 0 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .subtitle {
            font-size: clamp(12px, 2.5dvw, 16px);
            color: #666;
            margin: 0 0 48px;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }

        .app-card {
            display: block;
            text-decoration: none;
            color: white;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px 24px;
            transition: border-color 0.15s, background-color 0.15s;
            cursor: pointer;
        }

        .app-card:hover {
            border-color: #555;
            background-color: #222;
        }

        .app-card.disabled {
            cursor: default;
            opacity: 0.5;
        }

        .app-card.disabled:hover {
            border-color: #333;
            background-color: #1a1a1a;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .app-icon {
            font-size: clamp(20px, 4dvw, 28px);
        }

        .app-name {
            font-size: clamp(16px, 3.5dvw, 22px);
            font-weight: bold;
        }

        .app-badge {
            margin-left: auto;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background-color: #333;
            color: #888;
        }

        .app-badge.ready {
            background-color: #1b3a1b;
            color: #4caf50;
        }

        .app-desc {
            font-size: clamp(12px, 2.5dvw, 14px);
            color: #888;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<h1>☗ 将棋練習ツール</h1>
<p class="subtitle">将棋の基礎を鍛えるトレーニングアプリ集</p>

<div class="apps">
    <a class="app-card" href="./coordinate-practice/">
        <div class="app-header">
            <span class="app-icon">🎯</span>
            <span class="app-name">座標練習</span>
            <span class="app-badge ready">公開中</span>
        </div>
        <div class="app-desc">将棋盤の座標（筋・段）を素早く覚えるトレーニング。タイムアタックモード搭載。</div>
    </a>

    <a class="app-card" href="./castle-practice/">
        <div class="app-header">
            <span class="app-icon">🏯</span>
            <span class="app-name">囲い練習</span>
            <span class="app-badge ready">公開中</span>
        </div>
        <div class="app-desc">矢倉・美濃などの囲いを最短手順で習得するトレーニング。</div>
    </a>
</div>

</body>
</html>
